<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Carpool Display</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #1a1a1a;
            color: white;
            touch-action: none;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 15px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            margin: 0;
        }

        .header p {
            font-size: 14px;
            margin-top: 5px;
            opacity: 0.9;
        }

        /* Big Popup Name */
        .popup-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1000;
            width: 90%;
            max-width: 1200px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .popup-container.active {
            opacity: 1;
        }

        .popup-name {
            font-size: 80px;
            font-weight: 900;
            text-align: center;
            text-shadow: 0 8px 30px rgba(0,0,0,0.8);
            padding: 40px;
            border-radius: 30px;
            animation: popIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .popup-number {
            font-size: 36px;
            text-align: center;
            margin-top: 15px;
            opacity: 0.8;
        }

        .popup-row {
            font-size: 28px;
            text-align: center;
            margin-top: 8px;
            opacity: 0.7;
            font-weight: 600;
        }

        @keyframes popIn {
            0% {
                transform: scale(0.5);
                opacity: 0;
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* List of Recent Pickups - Two Column Layout */
        .list-container {
            margin-top: 20px;
            padding: 20px;
            max-height: calc(100vh - 150px);
            overflow-y: auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .column-header {
            font-size: 32px;
            font-weight: 800;
            text-align: center;
            padding: 15px;
            background: rgba(255,255,255,0.15);
            border-radius: 12px;
            margin-bottom: 15px;
            position: sticky;
            top: 0;
            z-index: 10;
            backdrop-filter: blur(10px);
            text-shadow: 0 2px 8px rgba(0,0,0,0.4);
            letter-spacing: 2px;
        }

        .row-column {
            display: flex;
            flex-direction: column;
        }

        .pickup-item {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            margin-bottom: 6px;
            border-radius: 10px;
            font-size: 42px;
            font-weight: 900;
            animation: slideIn 0.5s ease-out;
            box-shadow: 0 6px 20px rgba(0,0,0,0.5);
            line-height: 1;
            position: relative;
            cursor: pointer;
            user-select: none;
        }

        .pickup-item:active {
            transform: scale(0.98);
        }

        .pickup-item.dismissed-left {
            animation: swipeOutLeft 0.4s ease-in forwards;
        }

        .pickup-item.dismissed-right {
            animation: swipeOutRight 0.4s ease-in forwards;
        }

        @keyframes swipeOutLeft {
            to {
                transform: translateX(-120%);
                opacity: 0;
            }
        }

        @keyframes swipeOutRight {
            to {
                transform: translateX(120%);
                opacity: 0;
            }
        }

        @keyframes slideIn {
            from {
                transform: translateX(-100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .pickup-name {
            flex: 1;
            color: #ffffff;
            text-shadow: 4px 4px 8px rgba(0,0,0,0.9);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            line-height: 1;
        }

        .pickup-info {
            display: flex;
            gap: 0;
            align-items: center;
            font-size: 24px;
            opacity: 1;
        }

        .pickup-number {
            background: rgba(0,0,0,0.6);
            padding: 8px 16px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-weight: 700;
            color: #ffffff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
        }
            color: #ffffff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
            font-size: 18px;
        }

        .pickup-row {
            background: rgba(0,0,0,0.3);
            padding: 8px 20px;
            border-radius: 10px;
        }

        /* Community Colors - High Contrast for Visibility */
        .community-SH { 
            background: linear-gradient(135deg, #FF6B00 0%, #FF4500 100%); 
            color: white;
        }
        .community-NG { 
            background: linear-gradient(135deg, #00c851 0%, #007e33 100%); 
            color: white;
        }
        .community-MA { 
            background: linear-gradient(135deg, #FFD700 0%, #FFC700 100%); 
            color: #000000;
            font-weight: 900;
            text-shadow: 1px 1px 3px rgba(255,255,255,0.5);
        }
        .community-ZNH { 
            background: linear-gradient(135deg, #616161 0%, #424242 100%); 
            color: white;
        }
        .community-RF { 
            background: linear-gradient(135deg, #2196F3 0%, #1565C0 100%); 
            color: white;
        }
        .community-EG { 
            background: linear-gradient(135deg, #DC143C 0%, #8B0000 100%); 
            color: white;
        }
            color: white;
        }
        .community-UNKNOWN { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            color: white;
        }

        /* Config Section */
        .config-section {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            z-index: 2000;
            max-width: 400px;
        }

        .config-section.hidden {
            display: none;
        }

        .config-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border: none;
            padding: 15px 25px;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            z-index: 1999;
        }

        .config-input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 8px;
            background: rgba(0,0,0,0.3);
            color: white;
            font-size: 14px;
        }

        .config-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            margin-top: 10px;
        }

        .config-label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            opacity: 0.9;
        }

        .status {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            text-align: center;
        }

        .status.success {
            background: rgba(76, 175, 80, 0.3);
        }

        .status.error {
            background: rgba(244, 67, 54, 0.3);
        }

        .status.info {
            background: rgba(33, 150, 243, 0.3);
        }

        ::-webkit-scrollbar {
            width: 12px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.3);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255,255,255,0.5);
        }
    </style>
</head>
<body>
    <button class="config-toggle" onclick="toggleConfig()">⚙️ Settings</button>

    <div id="configSection" class="config-section hidden">
        <h3 style="margin-bottom: 15px;">Display Configuration</h3>
        
        <label class="config-label">Spreadsheet ID:</label>
        <input type="text" class="config-input" id="spreadsheetId" placeholder="Your spreadsheet ID">
        
        <label class="config-label">Data Sheet Name:</label>
        <input type="text" class="config-input" id="dataSheetName" value="Data">
        
        <label class="config-label">Form Responses Sheet Name:</label>
        <input type="text" class="config-input" id="responsesSheetName" value="Form responses">
        
        <label class="config-label">Google Apps Script Web App URL:</label>
        <input type="text" class="config-input" id="webAppUrl" placeholder="Paste your web app URL">
        
        <label class="config-label">Popup Duration (seconds):</label>
        <input type="number" class="config-input" id="popupDuration" value="3">
        
        <button class="config-btn" onclick="saveConfig()">Save & Start</button>
        <div id="statusMessage"></div>
    </div>

    <div class="header">
        <h1>🚗 Carpool Pickups</h1>
        <p>Student Dismissal Display</p>
    </div>

    <div class="popup-container" id="popupContainer">
        <div class="popup-name" id="popupName"></div>
        <div class="popup-number" id="popupNumber"></div>
        <div class="popup-row" id="popupRow"></div>
    </div>

    <div class="list-container" id="listContainer">
        <div class="row-column">
            <div class="column-header">ROW 1</div>
            <div id="row1List"></div>
        </div>
        <div class="row-column">
            <div class="column-header">ROW 2</div>
            <div id="row2List"></div>
        </div>
    </div>

    <script>
        let config = {
            spreadsheetId: '',
            dataSheetName: 'Data',
            responsesSheetName: 'Form responses',
            webAppUrl: '',
            popupDuration: 3
        };

        let studentData = [];
        let processedIds = new Set();
        let polling = null;

        // Community color mapping
        const communityColors = {
            'SH': 'community-SH',
            'NG': 'community-NG',
            'MA': 'community-MA',
            'ZNH': 'community-ZNH',
            'RF': 'community-RF',
            'EG': 'community-EG'
        };

        function loadConfig() {
            const saved = localStorage.getItem('carpoolDisplayConfig');
            if (saved) {
                config = JSON.parse(saved);
                document.getElementById('spreadsheetId').value = config.spreadsheetId || '';
                document.getElementById('dataSheetName').value = config.dataSheetName || 'Data';
                document.getElementById('responsesSheetName').value = config.responsesSheetName || 'Form responses';
                document.getElementById('webAppUrl').value = config.webAppUrl || '';
                document.getElementById('popupDuration').value = config.popupDuration || 3;
                
                if (config.webAppUrl) {
                    startPolling();
                }
            }
        }

        function toggleConfig() {
            const section = document.getElementById('configSection');
            section.classList.toggle('hidden');
        }

        function saveConfig() {
            config.spreadsheetId = document.getElementById('spreadsheetId').value;
            config.dataSheetName = document.getElementById('dataSheetName').value;
            config.responsesSheetName = document.getElementById('responsesSheetName').value;
            config.webAppUrl = document.getElementById('webAppUrl').value;
            config.popupDuration = parseInt(document.getElementById('popupDuration').value) || 3;
            
            localStorage.setItem('carpoolDisplayConfig', JSON.stringify(config));
            
            showStatus('Configuration saved! Loading data...', 'success');
            
            loadStudentData();
            startPolling();
            
            setTimeout(() => {
                document.getElementById('configSection').classList.add('hidden');
            }, 2000);
        }

        function showStatus(message, type) {
            const statusDiv = document.getElementById('statusMessage');
            statusDiv.innerHTML = `<div class="status ${type}">${message}</div>`;
        }

        async function loadStudentData() {
            if (!config.webAppUrl) return;

            try {
                const response = await fetch(`${config.webAppUrl}?action=getStudents&spreadsheetId=${config.spreadsheetId}&sheetName=${config.dataSheetName}`);
                const data = await response.json();
                
                if (data.success) {
                    studentData = data.students;
                    console.log('Student data loaded:', studentData.length, 'students');
                }
            } catch (error) {
                console.error('Error loading student data:', error);
            }
        }

        async function checkForNewPickups() {
            if (!config.webAppUrl) return;

            try {
                const response = await fetch(`${config.webAppUrl}?action=getRecentPickups&spreadsheetId=${config.spreadsheetId}&sheetName=${config.responsesSheetName}`);
                const data = await response.json();
                
                if (data.success && data.pickups) {
                    // Process new pickups (most recent first)
                    for (let pickup of data.pickups) {
                        if (!processedIds.has(pickup.id)) {
                            processedIds.add(pickup.id);
                            displayPickup(pickup);
                        }
                    }
                }
            } catch (error) {
                console.error('Error checking for pickups:', error);
            }
        }

        function displayPickup(pickup) {
            // Find student info to get community color
            const student = studentData.find(s => s.number == pickup.number);
            const community = student ? student.community : 'UNKNOWN';
            const colorClass = communityColors[community] || 'community-UNKNOWN';
            
            // Show big popup
            showPopup(pickup.name, pickup.number, pickup.type, colorClass);
            
            // Add to list after popup
            setTimeout(() => {
                addToList(pickup.name, pickup.number, pickup.type, colorClass);
            }, config.popupDuration * 1000);
        }

        function showPopup(name, number, rowType, colorClass) {
            const popup = document.getElementById('popupContainer');
            const nameEl = document.getElementById('popupName');
            const numberEl = document.getElementById('popupNumber');
            const rowEl = document.getElementById('popupRow');
            
            nameEl.textContent = name;
            nameEl.className = `popup-name ${colorClass}`;
            numberEl.textContent = `#${number}`;
            rowEl.textContent = `ROW ${rowType === 'ONE' ? '1' : '2'}`;
            
            popup.classList.add('active');
            
            setTimeout(() => {
                popup.classList.remove('active');
            }, config.popupDuration * 1000);
        }

        function addToList(name, number, rowType, colorClass) {
            // Determine which column to add to
            const listId = rowType === 'ONE' ? 'row1List' : 'row2List';
            const listContainer = document.getElementById(listId);
            
            const item = document.createElement('div');
            item.className = `pickup-item ${colorClass}`;
            item.innerHTML = `
                <div class="pickup-name">${name}</div>
                <div class="pickup-info">
                    <div class="pickup-number">#${number}</div>
                </div>
            `;
            
            // Add swipe-to-dismiss functionality
            enableSwipeToDismiss(item);
            
            listContainer.insertBefore(item, listContainer.firstChild);
            
            // Keep only last 30 items per column (increased from 20)
            while (listContainer.children.length > 30) {
                listContainer.removeChild(listContainer.lastChild);
            }
        }

        function enableSwipeToDismiss(element) {
            let tapCount = 0;
            let tapTimer = null;

            element.addEventListener('touchend', (e) => {
                tapCount++;
                
                if (tapCount === 1) {
                    // First tap - start timer
                    tapTimer = setTimeout(() => {
                        tapCount = 0;
                    }, 300); // Reset after 300ms
                } else if (tapCount === 2) {
                    // Double tap detected!
                    clearTimeout(tapTimer);
                    tapCount = 0;
                    
                    // Dismiss the item with random direction for visual variety
                    const direction = Math.random() > 0.5 ? 'right' : 'left';
                    element.classList.add(`dismissed-${direction}`);
                    
                    // Remove from DOM after animation
                    setTimeout(() => {
                        element.remove();
                    }, 400);
                }
            });

            // Also support regular click for desktop/testing
            let clickCount = 0;
            let clickTimer = null;

            element.addEventListener('click', (e) => {
                clickCount++;
                
                if (clickCount === 1) {
                    clickTimer = setTimeout(() => {
                        clickCount = 0;
                    }, 300);
                } else if (clickCount === 2) {
                    clearTimeout(clickTimer);
                    clickCount = 0;
                    
                    const direction = Math.random() > 0.5 ? 'right' : 'left';
                    element.classList.add(`dismissed-${direction}`);
                    
                    setTimeout(() => {
                        element.remove();
                    }, 400);
                }
            });
        }

        function startPolling() {
            if (polling) {
                clearInterval(polling);
            }
            
            // Check for new pickups every 2 seconds
            polling = setInterval(checkForNewPickups, 2000);
            
            // Load student data immediately
            loadStudentData();
            
            // Check for pickups immediately
            checkForNewPickups();
        }

        // Load config on startup
        loadConfig();
    </script>
</body>
</html>
